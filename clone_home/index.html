<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto home</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="shortcut icon" href="img/favicon.png" type="image/x-icon">
</head>
<body>
    <main>
        <div class="main-container">
            <div id="banner-container">
                <img src="img/banner.png" alt="Crie uma conta no instagram">
            </div>
            <div id="form-container">
                <h1>Se inscreva e comece a curtir</h1>
                <div id="form-box">
                    <form>
                        <label for="nome">Endereço de email</label>
                        <input type="email" name="email" id="email" placeholder="nome@dominio.com">
                        <a href="#">Usar número de telefone</a>
                        <button type="submit">Avançar</button>
                        
                        <span>ou</span>
                        
                        <a href="#">Inscrever-se no instagram</a>
                    </form>
                    <div class="line">

                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
